version: 2

multi-ecosystem-groups:
  python-consolidated:
    schedule:
      interval: "daily"

updates:
  # Handling Poetry
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/enterprise"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    multi-ecosystem-group: "python-consolidated"
    groups:
      # put packages in their own group if they have a history of breaking the build or needing to be reverted
      pre-commit:
        patterns:
          - "pre-commit"
      browsergym:
        patterns:
          - "browsergym*"
      mcp-packages:
        patterns:
          - "mcp"
      security-all:
        applies-to: "security-updates"
        patterns:
          - "*"
      version-all:
        applies-to: "version-updates"
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    multi-ecosystem-group: "python-consolidated"
    groups:
      pre-commit:
        patterns:
          - "pre-commit"
      browsergym:
        patterns:
          - "browsergym*"
      mcp-packages:
        patterns:
          - "mcp"
      security-all:
        applies-to: "security-updates"
        patterns:
          - "*"
      version-all:
        applies-to: "version-updates"
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    groups:
      docusaurus:
        patterns:
          - "*docusaurus*"
      eslint:
        patterns:
          - "*eslint*"
      security-all:
        applies-to: "security-updates"
        patterns:
          - "*"
      version-all:
        applies-to: "version-updates"
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 5
    groups:
      docusaurus:
        patterns:
          - "*docusaurus*"
      eslint:
        patterns:
          - "*eslint*"
      security-all:
        applies-to: "security-updates"
        patterns:
          - "*"
      version-all:
        applies-to: "version-updates"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directories:
      - "containers/*"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
